# MCP Tools Registry
# Generated by /moira:init — edit to customize tool guidelines
# Last refreshed: 2026-03-23

servers:
  ariadne:
    type: graph
    infrastructure: true
    tools:
      blast-radius:
        purpose: "Find files affected by changing a given file"
        cost: low
        reliability: high
        when_to_use: "Before modifying a file to understand impact"
        when_NOT_to_use: "Never — always useful for impact analysis"
        token_estimate: 500
      dependencies:
        purpose: "List direct dependencies of a file"
        cost: low
        reliability: high
        when_to_use: "When exploring what a file imports/depends on"
        when_NOT_to_use: "When you already have the file open and can see imports"
        token_estimate: 300
      dependents:
        purpose: "List files that depend on a given file"
        cost: low
        reliability: high
        when_to_use: "When assessing who uses a module before changing its API"
        when_NOT_to_use: "For broad exploration — use blast-radius instead"
        token_estimate: 300
      cycles:
        purpose: "Detect circular dependencies involving a file or cluster"
        cost: low
        reliability: high
        when_to_use: "When reviewing architecture or checking for circular imports"
        when_NOT_to_use: "For unrelated tasks — cycles are a structural concern"
        token_estimate: 400
      cluster:
        purpose: "Get files and metrics for a specific cluster"
        cost: low
        reliability: high
        when_to_use: "When exploring a module/domain to understand its scope"
        when_NOT_to_use: "When you already have the cluster view from static views"
        token_estimate: 500
      smells:
        purpose: "Detect architectural anti-patterns (god files, bottlenecks)"
        cost: low
        reliability: high
        when_to_use: "During architecture review or when reviewing large changes"
        when_NOT_to_use: "For small, localized changes"
        token_estimate: 400

  claude_ai_Context7:
    type: documentation
    tools:
      resolve-library-id:
        purpose: "Resolves package name to Context7 library ID"
        cost: low
        reliability: high
        when_to_use: "Before calling query-docs"
        when_NOT_to_use: "When user provides library ID directly"
        token_estimate: 1000
      query-docs:
        purpose: "Retrieves library documentation and code examples"
        cost: medium-high
        reliability: medium
        when_to_use: "When needing current API docs or usage patterns"
        when_NOT_to_use: "For general knowledge; when offline docs suffice"
        token_estimate: 10000

  claude_ai_Figma:
    type: design
    tools:
      get_design_context:
        purpose: "Returns code, screenshot, and metadata for a Figma node"
        cost: high
        reliability: high
        when_to_use: "When implementing UI from Figma design"
        when_NOT_to_use: "For non-UI tasks like Ariadne"
        token_estimate: 20000
      get_screenshot:
        purpose: "Generates screenshot of a Figma node"
        cost: medium-high
        reliability: high
        when_to_use: "When only visual reference is needed"
        when_NOT_to_use: "When code context also needed"
        token_estimate: 10000
      get_metadata:
        purpose: "Returns structural metadata for Figma file"
        cost: medium
        reliability: high
        when_to_use: "For overview of Figma structure"
        when_NOT_to_use: "When actual design code is needed"
        token_estimate: 3000
      get_variable_defs:
        purpose: "Returns design variable definitions"
        cost: low
        reliability: high
        when_to_use: "Mapping design tokens to code"
        when_NOT_to_use: "For general design context"
        token_estimate: 2000
      get_figjam:
        purpose: "Generates UI code from FigJam node"
        cost: medium-high
        reliability: medium
        when_to_use: "For FigJam board files"
        when_NOT_to_use: "For regular Figma files"
        token_estimate: 10000
      generate_diagram:
        purpose: "Creates diagrams in FigJam via Mermaid.js"
        cost: medium
        reliability: medium
        when_to_use: "Creating diagrams in FigJam"
        when_NOT_to_use: "For unsupported diagram types"
        token_estimate: 3000
      get_code_connect_map:
        purpose: "Returns Figma-to-code component mappings"
        cost: low
        reliability: high
        when_to_use: "Checking existing Code Connect"
        when_NOT_to_use: "When no Code Connect configured"
        token_estimate: 1500
      get_code_connect_suggestions:
        purpose: "AI-suggested Code Connect mappings"
        cost: medium
        reliability: medium
        when_to_use: "Setting up Code Connect"
        when_NOT_to_use: "When mappings exist"
        token_estimate: 4000
      add_code_connect_map:
        purpose: "Maps single Figma node to code component"
        cost: low
        reliability: high
        when_to_use: "Single Code Connect mapping"
        when_NOT_to_use: "For batch mappings"
        token_estimate: 1000
      send_code_connect_mappings:
        purpose: "Saves multiple Code Connect mappings"
        cost: low
        reliability: high
        when_to_use: "Batch save after suggestions"
        when_NOT_to_use: "For single mappings"
        token_estimate: 1500
      create_design_system_rules:
        purpose: "Generates design system rules prompt"
        cost: medium
        reliability: medium
        when_to_use: "Establishing design conventions"
        when_NOT_to_use: "One-off implementations"
        token_estimate: 4000
      whoami:
        purpose: "Returns authenticated Figma user info"
        cost: low
        reliability: high
        when_to_use: "Debugging Figma permissions"
        when_NOT_to_use: "Normal operation"
        token_estimate: 500
