name: Bug report
description: Report a defect in Ariadne
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues
        first, then fill in the fields below so we can reproduce the problem.
  - type: input
    id: version
    attributes:
      label: Ariadne version
      description: Output of `ariadne --version`, or the commit hash you built from.
      placeholder: "e.g. ariadne 1.0.0 or 9b515b1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands or actions, in order.
      placeholder: |
        1. Run `ariadne index .`
        2. Call the `blast_radius` tool for symbol `X`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Relevant logs, error messages, or stack traces. This is rendered as code, so no backticks are needed.
      render: shell
    validations:
      required: false
