name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem before the
        solution so we can evaluate the underlying need.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior or capability you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have evaluated, and why they fall short.
    validations:
      required: false
