# MCP Tools Registry
# Generated by /moira:init — edit to customize tool guidelines

servers:
  ariadne:
    type: graph
    infrastructure: true
    tools:
      blast-radius:
        purpose: "Find files affected by changing a given file. Accepts optional symbol parameter for function-level precision."
        cost: low
        reliability: high
        when_to_use: "Before modifying a file to understand impact"
        when_NOT_to_use: "Never — always useful for impact analysis"
        token_estimate: 500
      dependencies:
        purpose: "List direct dependencies of a file. Includes symbol_edges for cross-file symbol relationships."
        cost: low
        reliability: high
        when_to_use: "When exploring what a file imports/depends on"
        when_NOT_to_use: "When you already have the file open and can see imports"
        token_estimate: 300
      dependents:
        purpose: "List files that depend on a given file"
        cost: low
        reliability: high
        when_to_use: "When assessing who uses a module before changing its API"
        when_NOT_to_use: "For broad exploration — use blast-radius instead"
        token_estimate: 300
      cycles:
        purpose: "Detect circular dependencies involving a file or cluster"
        cost: low
        reliability: high
        when_to_use: "When reviewing architecture or checking for circular imports"
        when_NOT_to_use: "For unrelated tasks — cycles are a structural concern"
        token_estimate: 400
      cluster:
        purpose: "Get files and metrics for a specific cluster"
        cost: low
        reliability: high
        when_to_use: "When exploring a module/domain to understand its scope"
        when_NOT_to_use: "When you already have the cluster view from static views"
        token_estimate: 500
      smells:
        purpose: "Detect architectural anti-patterns (god files, bottlenecks)"
        cost: low
        reliability: high
        when_to_use: "During architecture review or when reviewing large changes"
        when_NOT_to_use: "For small, localized changes"
        token_estimate: 400
      symbols:
        purpose: "List all symbols in a file (functions, classes, types) with kinds, visibility, and line spans"
        cost: low
        reliability: high
        when_to_use: "When you need to know what a file exports/defines without reading it"
        when_NOT_to_use: "When you already have the file open — just read it"
        token_estimate: 500
      symbol-search:
        purpose: "Search for symbols across the project by name substring and optional kind filter"
        cost: low
        reliability: high
        when_to_use: "When looking for a function, class, or type by name — faster and more precise than grep"
        when_NOT_to_use: "When searching for non-symbol text (comments, strings, config values)"
        token_estimate: 500
      callers:
        purpose: "Find all cross-file call sites of a specific symbol"
        cost: low
        reliability: high
        when_to_use: "When verifying all call sites are updated after changing a function signature"
        when_NOT_to_use: "When you need intra-file references — use grep instead"
        token_estimate: 400
      callees:
        purpose: "Find all cross-file symbols called by a specific function"
        cost: low
        reliability: high
        when_to_use: "When understanding what a function depends on across files"
        when_NOT_to_use: "When you need intra-file call flow"
        token_estimate: 400
      symbol-blast-radius:
        purpose: "Trace transitive callers of a symbol through the call graph"
        cost: low
        reliability: high
        when_to_use: "When assessing the impact of changing a specific function or method"
        when_NOT_to_use: "For file-level impact — use blast-radius without symbol parameter"
        token_estimate: 600
      context:
        purpose: "Assemble optimal file context for a task within a token budget, ranked by relevance"
        cost: medium
        reliability: high
        when_to_use: "When assembling implementation context — replaces multiple individual file/dependency queries"
        when_NOT_to_use: "For quick single-file lookups — use file or dependencies instead"
        token_estimate: 3000
      tests-for:
        purpose: "Identify test files for given source files via dependency edges and name heuristics"
        cost: low
        reliability: high
        when_to_use: "Before writing tests — check what test coverage already exists"
        when_NOT_to_use: "When you already know the test file location"
        token_estimate: 400
      reading-order:
        purpose: "Get optimal file reading order (topological sort) for understanding an area"
        cost: low
        reliability: high
        when_to_use: "When exploring an unfamiliar area — provides structured understanding path"
        when_NOT_to_use: "When you already understand the area or need only one file"
        token_estimate: 500
      plan-impact:
        purpose: "Analyze impact of planned changes: blast radius, affected tests, risk assessment"
        cost: medium
        reliability: high
        when_to_use: "During requirements/planning to assess structural impact before implementation"
        when_NOT_to_use: "After implementation — use diff tool instead to see actual changes"
        token_estimate: 1000
      annotate:
        purpose: "Add or update annotation on a file, cluster, symbol, or edge target"
        cost: low
        reliability: high
        when_to_use: "When marking tech-debt, architectural notes, or needs-refactor tags on graph elements"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 300
      annotations:
        purpose: "List annotations with optional tag and target filters"
        cost: low
        reliability: high
        when_to_use: "When checking existing annotations on files, clusters, or symbols"
        when_NOT_to_use: "When you only need file-level info — annotations are included in ariadne_file responses"
        token_estimate: 500
      remove-annotation:
        purpose: "Remove an annotation by ID"
        cost: low
        reliability: high
        when_to_use: "When cleaning up stale or incorrect annotations"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 200
      bookmark:
        purpose: "Create a named subgraph bookmark for later reference in context and subgraph queries"
        cost: low
        reliability: high
        when_to_use: "When creating task-scoped bookmarks for downstream agents to use in ariadne_context calls"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 300
      bookmarks:
        purpose: "List all bookmarks"
        cost: low
        reliability: high
        when_to_use: "When checking existing bookmarks before creating duplicates"
        when_NOT_to_use: "Never — always safe to check existing bookmarks"
        token_estimate: 300
      remove-bookmark:
        purpose: "Remove a bookmark by name"
        cost: low
        reliability: high
        when_to_use: "When cleaning up task-scoped bookmarks after task completion"
        when_NOT_to_use: "Only specific agents are authorized to use write tools — check your role definition"
        token_estimate: 200
      churn:
        purpose: "Files ranked by change frequency for a given period (30d, 90d, 1y)"
        cost: low
        reliability: high
        when_to_use: "When assessing file stability or identifying frequently-changed areas"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      coupling:
        purpose: "Co-change pairs above a confidence threshold — files that change together"
        cost: low
        reliability: high
        when_to_use: "When looking for implicit coupling between files that may not have import links"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      hotspots:
        purpose: "Files ranked by composite risk: churn x LOC x blast_radius"
        cost: low
        reliability: high
        when_to_use: "When identifying high-risk files that are both frequently changed and structurally important"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      ownership:
        purpose: "Authors and contributors per file or project-wide"
        cost: low
        reliability: high
        when_to_use: "When identifying domain experts or understanding knowledge distribution across files"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 500
      hidden-deps:
        purpose: "Co-change pairs with NO structural import link — hidden dependencies"
        cost: low
        reliability: high
        when_to_use: "When looking for invisible coupling that structural analysis misses"
        when_NOT_to_use: "When temporal data is unavailable — check temporal_available flag"
        token_estimate: 400
  ariadne:
    type: code
    description: "Ariadne structural dependency graph engine — project-local MCP server"
    config_source: ".mcp.json"
    tools:
      ariadne_overview:
        purpose: "Project summary: node/edge counts, language breakdown, layer distribution, critical files, cycles count, max depth"
        cost: low
        reliability: high
        when_to_use: "Starting a new task to understand project scope and structure"
        when_NOT_to_use: "When you already have project context loaded"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_file:
        purpose: "File detail: type, layer, arch_depth, exports, cluster, centrality, incoming/outgoing edges"
        cost: low
        reliability: high
        when_to_use: "Understanding a specific file's role in the architecture"
        when_NOT_to_use: "When you just need file contents (use Read instead)"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_dependencies:
        purpose: "Direct dependencies of a file. Direction: in, out, or both"
        cost: low
        reliability: high
        when_to_use: "Tracing imports/dependents for a specific file"
        when_NOT_to_use: "When you need full transitive closure (use blast_radius)"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_blast_radius:
        purpose: "Reverse BFS: map of affected files with distances from a given file or symbol. Optionally follows semantic edges."
        cost: medium
        reliability: high
        when_to_use: "Impact analysis before modifying a file or symbol"
        when_NOT_to_use: "When you only need direct neighbors (use dependencies)"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      ariadne_symbol_blast_radius:
        purpose: "BFS through symbol usages to find all affected symbols and files at increasing depths"
        cost: medium
        reliability: high
        when_to_use: "Tracing impact of changing a specific function/type/constant"
        when_NOT_to_use: "When analyzing file-level impact only (use blast_radius)"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      ariadne_context:
        purpose: "Assemble optimal file context for a task. Returns ranked files within a token budget, scored by relevance."
        cost: medium
        reliability: high
        when_to_use: "Building a reading list for a task — understands task types (add_field, refactor, fix_bug, add_feature, understand)"
        when_NOT_to_use: "When you already know exactly which files to read"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_plan_impact:
        purpose: "Analyze structural impact of planned file changes. Returns blast radius, affected tests, risk assessment."
        cost: medium
        reliability: high
        when_to_use: "Before implementing a multi-file change plan"
        when_NOT_to_use: "For single-file trivial changes"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      ariadne_subgraph:
        purpose: "Extract filtered subgraph: nodes + edges + clusters in the neighborhood of given files"
        cost: medium
        reliability: high
        when_to_use: "Visualizing or analyzing a local region of the dependency graph"
        when_NOT_to_use: "When you need the full project graph (use overview)"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      ariadne_cycles:
        purpose: "All strongly connected components (circular dependencies)"
        cost: low
        reliability: high
        when_to_use: "Checking for circular dependency issues"
        when_NOT_to_use: "General project exploration"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_layers:
        purpose: "Topological layers: files grouped by architectural depth level"
        cost: medium
        reliability: high
        when_to_use: "Understanding architectural layering and depth"
        when_NOT_to_use: "When you need specific file details (use file)"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      ariadne_cluster:
        purpose: "Cluster detail: files, internal/external deps, cohesion"
        cost: low
        reliability: high
        when_to_use: "Understanding a module/directory grouping"
        when_NOT_to_use: "When you need per-file details"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_centrality:
        purpose: "Bottleneck files sorted by betweenness centrality score"
        cost: low
        reliability: high
        when_to_use: "Identifying architectural bottlenecks and critical paths"
        when_NOT_to_use: "General file lookup"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_importance:
        purpose: "Files ranked by combined importance score (betweenness centrality + PageRank)"
        cost: low
        reliability: high
        when_to_use: "Identifying the most structurally important files in the project"
        when_NOT_to_use: "When you already know which files matter"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_metrics:
        purpose: "Martin metrics per cluster: instability, abstractness, distance from main sequence, zone classification"
        cost: low
        reliability: high
        when_to_use: "Evaluating module coupling/cohesion health"
        when_NOT_to_use: "General project exploration"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_smells:
        purpose: "Detect architectural smells: god files, circular deps, layer violations, hub-and-spoke, unstable foundations, dead clusters, shotgun surgery, orphan routes/events"
        cost: medium
        reliability: high
        when_to_use: "Architecture health audit or before refactoring"
        when_NOT_to_use: "Normal feature development"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      ariadne_refactor_opportunities:
        purpose: "Pareto-ranked refactoring recommendations with effort/impact estimates"
        cost: medium
        reliability: high
        when_to_use: "Planning refactoring work"
        when_NOT_to_use: "Normal feature development"
        budget_impact: "~3-5k tokens per call"
        token_estimate: 4000
      ariadne_symbols:
        purpose: "Symbol definitions in a file: functions, classes, methods, interfaces, constants with visibility and line spans"
        cost: low
        reliability: high
        when_to_use: "Understanding what a file exports/defines"
        when_NOT_to_use: "When you need full file contents (use Read)"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_symbol_search:
        purpose: "Search symbols by name across the entire project. Case-insensitive substring match with optional kind filter."
        cost: low
        reliability: high
        when_to_use: "Finding where a function/type/constant is defined across the codebase"
        when_NOT_to_use: "When you know the file path already"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_callers:
        purpose: "Cross-file callers of a symbol: which files import/reference a symbol definition"
        cost: low
        reliability: high
        when_to_use: "Finding all usages of a specific symbol"
        when_NOT_to_use: "File-level dependency tracing (use dependencies)"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_callees:
        purpose: "Cross-file callees of a symbol: which files/symbols does this symbol's file import via this name"
        cost: low
        reliability: high
        when_to_use: "Understanding what a symbol depends on"
        when_NOT_to_use: "File-level dependency tracing (use dependencies)"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_reading_order:
        purpose: "Topologically sorted reading order for understanding a set of files"
        cost: low
        reliability: high
        when_to_use: "Determining optimal order to read and understand code"
        when_NOT_to_use: "When you already understand the code"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_tests_for:
        purpose: "Find test files covering given source files. Returns tests with confidence levels and detection reasons."
        cost: low
        reliability: high
        when_to_use: "Finding which tests to run after modifying files"
        when_NOT_to_use: "When you already know the test file"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_compressed:
        purpose: "Hierarchical graph compression. Level 0: project overview. Level 1: cluster detail. Level 2: file neighborhood."
        cost: medium
        reliability: high
        when_to_use: "Progressive drill-down into project structure"
        when_NOT_to_use: "When you need raw graph data (use subgraph)"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000
      ariadne_diff:
        purpose: "Structural diff since last auto-update: added/removed nodes and edges, new/resolved cycles, new/resolved smells"
        cost: low
        reliability: high
        when_to_use: "Checking what changed structurally since last graph build"
        when_NOT_to_use: "Git diff comparison (use git diff)"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_freshness:
        purpose: "Graph freshness: overall confidence, stale files list, last update time"
        cost: low
        reliability: high
        when_to_use: "Checking if graph data is current before relying on it"
        when_NOT_to_use: "N/A — always valid to check"
        budget_impact: "~0.5-1k tokens per call"
        token_estimate: 500
      ariadne_spectral:
        purpose: "Spectral analysis: algebraic connectivity, monolith score, natural graph bisection via Fiedler vector"
        cost: low
        reliability: high
        when_to_use: "Advanced architectural analysis — modularity assessment"
        when_NOT_to_use: "Normal development tasks"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_churn:
        purpose: "File change frequency from git history: commit counts, lines changed, authors per file across time windows"
        cost: medium
        reliability: high
        when_to_use: "Identifying frequently-changed files for risk assessment"
        when_NOT_to_use: "When you need current git status (use git)"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_coupling:
        purpose: "Co-change coupling from git history: file pairs that frequently change together, with confidence scores"
        cost: medium
        reliability: high
        when_to_use: "Detecting implicit coupling between files"
        when_NOT_to_use: "Structural dependency analysis (use dependencies)"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_hidden_deps:
        purpose: "File pairs that co-change frequently but have NO structural import link — potential missing abstractions"
        cost: medium
        reliability: high
        when_to_use: "Discovering implicit coupling not visible in imports"
        when_NOT_to_use: "Normal development tasks"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_hotspots:
        purpose: "High-risk change hotspots: files with high combined churn, size, and blast radius scores"
        cost: medium
        reliability: high
        when_to_use: "Risk assessment before major changes"
        when_NOT_to_use: "Normal feature development"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_ownership:
        purpose: "File ownership from git history: last author, top contributors, author count"
        cost: low
        reliability: high
        when_to_use: "Understanding who owns/maintains specific files"
        when_NOT_to_use: "Normal development tasks"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_boundaries:
        purpose: "List all detected semantic boundaries (HTTP routes, event channels) grouped by file"
        cost: low
        reliability: high
        when_to_use: "Understanding service API surface and event-driven boundaries"
        when_NOT_to_use: "Projects without HTTP routes or events"
        budget_impact: "~1-3k tokens per call"
        token_estimate: 2000
      ariadne_boundary_for:
        purpose: "All semantic boundaries (routes, events) defined in a specific file"
        cost: low
        reliability: high
        when_to_use: "Checking what API surface a specific file exposes"
        when_NOT_to_use: "Files that are not API handlers"
        budget_impact: "~0.5-1k tokens per call"
        token_estimate: 800
      ariadne_route_map:
        purpose: "HTTP route map: routes grouped by path, showing handler and consumer files"
        cost: medium
        reliability: high
        when_to_use: "Understanding API routing structure"
        when_NOT_to_use: "Non-web projects"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_event_map:
        purpose: "Event channel map: events grouped by name, showing producer and consumer files"
        cost: medium
        reliability: high
        when_to_use: "Understanding event-driven architecture"
        when_NOT_to_use: "Projects without event systems"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_suggest_placement:
        purpose: "Suggest optimal file location for a new module based on dependency relationships and cluster analysis"
        cost: low
        reliability: high
        when_to_use: "Deciding where to place a new file in the project"
        when_NOT_to_use: "When placement is already specified in a spec or plan"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      ariadne_suggest_split:
        purpose: "Analyze a file and suggest how to split it into smaller, more cohesive modules"
        cost: medium
        reliability: high
        when_to_use: "Refactoring large files"
        when_NOT_to_use: "Files that are already small and cohesive"
        budget_impact: "~2-4k tokens per call"
        token_estimate: 3000
      ariadne_annotate:
        purpose: "Add or update an annotation on a graph element (file, cluster, or edge)"
        cost: low
        reliability: high
        when_to_use: "Tagging files with metadata (entry-point, deprecated, hot-path)"
        when_NOT_to_use: "Read-only analysis tasks"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_annotations:
        purpose: "List annotations with optional filters by label, target type, or target path"
        cost: low
        reliability: high
        when_to_use: "Retrieving previously set annotations"
        when_NOT_to_use: "When no annotations have been set"
        budget_impact: "~0.5-1k tokens per call"
        token_estimate: 800
      ariadne_remove_annotation:
        purpose: "Remove an annotation by its id"
        cost: low
        reliability: high
        when_to_use: "Cleaning up stale annotations"
        when_NOT_to_use: "Read-only analysis"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_bookmark:
        purpose: "Create or update a named bookmark pointing to file paths or directory prefixes"
        cost: low
        reliability: high
        when_to_use: "Saving a file set for reuse with subgraph/context tools"
        when_NOT_to_use: "One-off queries"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_bookmarks:
        purpose: "List all saved bookmarks with their paths and descriptions"
        cost: low
        reliability: high
        when_to_use: "Checking existing bookmarks before creating new ones"
        when_NOT_to_use: "When no bookmarks have been created"
        budget_impact: "~0.5-1k tokens per call"
        token_estimate: 500
      ariadne_remove_bookmark:
        purpose: "Remove a bookmark by name"
        cost: low
        reliability: high
        when_to_use: "Cleaning up stale bookmarks"
        when_NOT_to_use: "Read-only analysis"
        budget_impact: "~0.5k tokens per call"
        token_estimate: 500
      ariadne_views_export:
        purpose: "Pre-generated markdown views from .ariadne/views/. Levels: L0 (index), L1 (cluster), L2 (impact)"
        cost: medium
        reliability: high
        when_to_use: "Getting pre-rendered architectural views"
        when_NOT_to_use: "When you need live/dynamic data"
        budget_impact: "~2-5k tokens per call"
        token_estimate: 3000

  context7:
    type: documentation
    description: "Context7 — fetches up-to-date library/framework documentation and code examples"
    config_source: "claude.ai built-in plugin"
    tools:
      resolve-library-id:
        purpose: "Resolve a package/product name to a Context7-compatible library ID. Must be called before query-docs."
        cost: low
        reliability: medium
        when_to_use: "Before querying docs for any library — required first step"
        when_NOT_to_use: "When you already have the Context7 library ID"
        budget_impact: "~1-2k tokens per call"
        token_estimate: 1500
      query-docs:
        purpose: "Fetch current documentation and code examples for a specific library/framework"
        cost: medium-high
        reliability: medium
        when_to_use: "Looking up API syntax, configuration, version migration, library-specific debugging, setup instructions. Use even for well-known libraries — training data may be stale."
        when_NOT_to_use: "Refactoring, writing scripts from scratch, debugging business logic, code review, general programming concepts"
        budget_impact: "~5-15k tokens per call"
        token_estimate: 8000

  figma:
    type: design
    description: "Official Figma MCP server — read/write Figma designs, FigJam, Code Connect"
    config_source: "claude.ai built-in plugin"
    tools:
      get_design_context:
        purpose: "Primary design-to-code tool. Returns reference code, screenshot, and contextual metadata for a Figma node."
        cost: high
        reliability: medium
        when_to_use: "Implementing UI from a Figma design URL"
        when_NOT_to_use: "Non-UI tasks; this project is a Rust CLI tool with no UI"
        budget_impact: "~10-20k tokens per call (includes images)"
        token_estimate: 15000
      get_screenshot:
        purpose: "Generate a screenshot for a given Figma node"
        cost: high
        reliability: medium
        when_to_use: "Visual reference for a Figma design"
        when_NOT_to_use: "Non-UI tasks"
        budget_impact: "~5-15k tokens per call (image data)"
        token_estimate: 10000
      get_metadata:
        purpose: "Get node/page metadata in XML format (IDs, layer types, names, positions, sizes)"
